<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word to PPT Converter (Fixed)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/libs/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.min.js"></script>
    
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 40px;
        }

        h2 { margin-top: 0; margin-bottom: 24px; text-align: center; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; }

        select, input[type="file"] {
            width: 100%; padding: 12px; border: 1px solid var(--border);
            border-radius: 10px; font-size: 14px; background-color: #F9FAFB;
        }

        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
        .checkbox-group input { width: 18px; height: 18px; accent-color: var(--primary); }

        button {
            width: 100%; background-color: var(--primary); color: white; border: none;
            padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
        }

        #status { margin-top: 20px; text-align: center; font-size: 14px; color: var(--primary); }
    </style>
</head>
<body>

    <div class="card">
        <h2>Word to PPT 변환기</h2>
        
        <div class="form-group">
            <label for="upload">Word 파일 (.docx) 업로드</label>
            <input type="file" id="upload" accept=".docx">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="max-lines" checked>
            <label for="max-lines">한 슬라이드당 최대 6줄 제한 (자동 분할)</label>
        </div>

        <div class="form-group">
            <label for="font-size">글자 크기</label>
            <select id="font-size">
                <option value="48">48pt</option>
                <option value="60">60pt</option>
            </select>
        </div>

        <div class="form-group">
            <label for="text-align">텍스트 정렬</label>
            <select id="text-align">
                <option value="center">중앙 정렬</option>
                <option value="left">좌측 정렬</option>
            </select>
        </div>

        <button id="convert-btn" onclick="startConversion()">PPT로 변환 및 다운로드</button>
        <div id="status"></div>
    </div>

    <script>
        function colorToHex(color) {
            let ctx = document.createElement("canvas").getContext("2d");
            ctx.fillStyle = color;
            let hex = ctx.fillStyle;
            return hex.startsWith('#') ? hex.replace('#', '').toUpperCase() : '000000';
        }

        // 특정 노드(p태그 등) 내부의 텍스트와 서식을 추출
        function parseNode(node, currentStyle) {
            let result = [];
            node.childNodes.forEach(child => {
                if (child.nodeType === Node.TEXT_NODE) {
                    if (child.textContent.length > 0) {
                        result.push({ text: child.textContent, options: { ...currentStyle } });
                    }
                } else if (child.nodeType === Node.ELEMENT_NODE) {
                    let newStyle = { ...currentStyle };
                    if (['STRONG', 'B'].includes(child.tagName)) newStyle.bold = true;
                    if (child.style && child.style.color) newStyle.color = colorToHex(child.style.color);
                    result = result.concat(parseNode(child, newStyle));
                }
            });
            return result;
        }

        async function startConversion() {
            const fileInput = document.getElementById('upload');
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('convert-btn');

            if (!fileInput.files.length) { alert("파일을 선택해주세요."); return; }

            btn.disabled = true;
            statusDiv.textContent = "변환을 시작합니다...";

            try {
                const arrayBuffer = await fileInput.files[0].arrayBuffer();
                
                // 1. Mammoth로 HTML 변환 (빈 줄 보존 중요)
                const result = await mammoth.convertToHtml({ arrayBuffer: arrayBuffer }, { ignoreEmptyParagraphs: false });
                const parser = new DOMParser();
                const doc = parser.parseFromString(result.value, 'text/html');
                const paragraphs = Array.from(doc.querySelectorAll('p'));

                // 2. 데이터 정제: 각 단락을 서식 객체 배열로 변환
                let allLines = paragraphs.map(p => {
                    const lineContent = parseNode(p, {});
                    const rawText = p.textContent.trim();
                    return { content: lineContent, isEmpty: rawText === "" };
                });

                // 3. 1차 분할: 빈 줄(엔터 2번) 기준
                let initialChunks = [];
                let tempChunk = [];
                allLines.forEach(line => {
                    if (line.isEmpty) {
                        if (tempChunk.length > 0) {
                            initialChunks.push(tempChunk);
                            tempChunk = [];
                        }
                    } else {
                        tempChunk.push(line.content);
                    }
                });
                if (tempChunk.length > 0) initialChunks.push(tempChunk);

                // 4. 2차 분할: 6줄 초과 시 강제 분할 (로직 강화)
                const enforceMaxLines = document.getElementById('max-lines').checked;
                let finalChunks = [];

                initialChunks.forEach(chunk => {
                    if (enforceMaxLines && chunk.length > 6) {
                        for (let i = 0; i < chunk.length; i += 6) {
                            finalChunks.push(chunk.slice(i, i + 6));
                        }
                    } else {
                        finalChunks.push(chunk);
                    }
                });

                // 5. PPT 생성
                let pptx = new PptxGenJS();
                pptx.layout = 'LAYOUT_16x9';
                const fontSize = parseInt(document.getElementById('font-size').value);
                const textAlign = document.getElementById('text-align').value;

                finalChunks.forEach(chunk => {
                    let slide = pptx.addSlide();
                    let textObjs = [];
                    
                    chunk.forEach((line, idx) => {
                        line.forEach(part => {
                            textObjs.push({
                                text: part.text,
                                options: {
                                    bold: part.options.bold || false,
                                    color: part.options.color || '000000',
                                    fontSize: fontSize,
                                    fontFace: '옥션고딕 B'
                                }
                            });
                        });
                        if (idx < chunk.length - 1) {
                            textObjs.push({ text: '', options: { breakLine: true } });
                        }
                    });

                    slide.addText(textObjs, {
                        x: '5%', y: '5%', w: '90%', h: '90%',
                        align: textAlign, valign: 'middle'
                    });
                });

                await pptx.writeFile({ fileName: `Converted_PPT_${Date.now()}.pptx` });
                statusDiv.textContent = "다운로드 완료!";
            } catch (e) {
                statusDiv.textContent = "에러 발생: " + e.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
