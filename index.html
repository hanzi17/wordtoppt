<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word → PowerPoint 변환기 (Pro Version)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/libs/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.min.js"></script>
    
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F9FAFB;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .main-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 40px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .header-section h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 8px 0;
            color: var(--text-main);
        }

        .header-section p {
            font-size: 15px;
            color: var(--text-muted);
            margin: 0;
        }

        /* 파일 업로드 영역 */
        .upload-section {
            margin-bottom: 32px;
        }

        .upload-label {
            display: block;
            border: 2px dashed #C7D2FE;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            background-color: #FDFEFE;
            transition: all 0.2s;
        }

        .upload-label:hover {
            border-color: var(--primary);
            background-color: #F9FAFB;
        }

        .upload-icon {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background-color: #E0E7FF;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .upload-icon svg { width: 24px; height: 24px; }

        .upload-text {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .upload-subtext {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
        }

        input[type="file"] { display: none; }

        /* 변환 옵션 카드 */
        .options-section {
            background-color: #FDFEFE;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
        }

        .options-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 20px;
        }

        .options-header svg { width: 16px; height: 16px; color: var(--text-muted); }

        .form-group { margin-bottom: 16px; }
        .form-group:last-child { margin-bottom: 0; }

        .group-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            margin: 0;
            cursor: pointer;
        }

        .checkbox-group label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
            margin: 0;
            cursor: pointer;
        }

        select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            background-color: #F9FAFB;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus { outline: none; border-color: var(--primary); }

        /* 변환 버튼 */
        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: var(--text-muted); cursor: not-allowed; }

        #status {
            margin-top: 16px;
            text-align: center;
            font-size: 13px;
            color: var(--primary);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-card">
            <div class="header-section">
                <h1>Word → PowerPoint 변환기</h1>
                <p>서식을 유지하면서 워드 문서를 파워포인트로 변환하세요</p>
            </div>
            
            <div class="upload-section">
                <label for="upload" class="upload-label">
                    <span class="upload-icon">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 16V8M12 8L9 11M12 8L15 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 15V19C3 20.1046 3.89543 21 5 21H19C20.1046 21 21 20.1046 21 19V15M5 3H19C20.1046 3 21 3.89543 21 5V6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </span>
                    <span class="upload-text">워드 파일을 드래그하거나 클릭하세요</span>
                    <span class="upload-subtext">지원 파일: .docx</span>
                </label>
                <input type="file" id="upload" accept=".docx">
            </div>

            <div class="options-section">
                <div class="options-header">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    변환 옵션
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="max-lines" checked>
                    <label for="max-lines">한 슬라이드당 최대 6줄 제한 (자동 분할)</label>
                </div>

                <div class="form-group">
                    <label for="font-size" class="group-label">글자 크기</label>
                    <select id="font-size">
                        <option value="48">48pt</option>
                        <option value="60">60pt</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="text-align" class="group-label">텍스트 정렬</label>
                    <select id="text-align">
                        <option value="center">중앙 정렬</option>
                        <option value="left">좌측 정렬</option>
                    </select>
                </div>
            </div>

            <button id="convert-btn" onclick="startConversion()">파워포인트로 변환 및 다운로드</button>
            <div id="status"></div>
        </div>
    </div>

    <script>
        // RGB나 색상 이름을 HEX 코드로 변환하는 헬퍼 함수
        function colorToHex(color) {
            let ctx = document.createElement("canvas").getContext("2d");
            ctx.fillStyle = color;
            let hex = ctx.fillStyle;
            return hex.startsWith('#') ? hex.replace('#', '').toUpperCase() : '000000';
        }

        // HTML 노드를 순회하며 텍스트와 서식을 추출하는 함수
        function parseNode(node, currentStyle) {
            let result = [];
            node.childNodes.forEach(child => {
                if (child.nodeType === Node.TEXT_NODE) {
                    if (child.textContent.length > 0) {
                        result.push({ text: child.textContent, options: { ...currentStyle } });
                    }
                } else if (child.nodeType === Node.ELEMENT_NODE) {
                    let newStyle = { ...currentStyle };
                    if (['STRONG', 'B'].includes(child.tagName)) newStyle.bold = true;
                    if (child.style && child.style.color) newStyle.color = colorToHex(child.style.color);
                    result = result.concat(parseNode(child, newStyle));
                }
            });
            return result;
        }

        async function startConversion() {
            const fileInput = document.getElementById('upload');
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('convert-btn');

            if (!fileInput.files.length) { alert("먼저 워드 파일을 선택해주세요."); return; }

            const file = fileInput.files[0];
            btn.disabled = true;
            statusDiv.textContent = "문서를 분석하는 중...";

            try {
                const arrayBuffer = await file.arrayBuffer();
                
                // Mammoth를 사용하여 docx를 HTML로 변환 (빈 줄 보존 중요)
                const result = await mammoth.convertToHtml(
                    { arrayBuffer: arrayBuffer },
                    { ignoreEmptyParagraphs: false }
                );
                const parser = new DOMParser();
                const doc = parser.parseFromString(result.value, 'text/html');
                const paragraphs = Array.from(doc.querySelectorAll('p'));

                // 로직 요구사항: 각 단락을 서식 객체 배열로 변환
                let allLines = paragraphs.map(p => {
                    const lineContent = parseNode(p, {});
                    const rawText = p.textContent.trim();
                    // 완전히 비어있는 줄인지 확인
                    return { content: lineContent, isEmpty: rawText === "" };
                });

                // 1차 분할: '빈 줄(엔터 2번)' 기준
                let initialChunks = [];
                let tempChunk = [];
                allLines.forEach(line => {
                    if (line.isEmpty) {
                        if (tempChunk.length > 0) {
                            initialChunks.push(tempChunk);
                            tempChunk = [];
                        }
                    } else {
                        tempChunk.push(line.content);
                    }
                });
                if (tempChunk.length > 0) initialChunks.push(tempChunk); // 마지막 덩어리 추가

                // 2차 분할: 6줄 초과 시 강제 분할 (로직 핵심)
                const enforceMaxLines = document.getElementById('max-lines').checked;
                let finalChunks = [];

                initialChunks.forEach(chunk => {
                    // 사용자 옵션이 켜져 있고, 6줄을 초과한다면
                    if (enforceMaxLines && chunk.length > 6) {
                        // 자바스크립트의 slice를 사용해 정확히 6줄 단위로 자름
                        for (let i = 0; i < chunk.length; i += 6) {
                            finalChunks.push(chunk.slice(i, i + 6));
                        }
                    } else {
                        finalChunks.push(chunk);
                    }
                });

                statusDiv.textContent = "슬라이드를 생성하는 중...";
                
                // PPT 생성 (PptxGenJS)
                let pptx = new PptxGenJS();
                
                // 도화지 크기 설정 문제 해결: 최신 Widescreen 규격(13.33 x 7.5인치) 강제 적용
                pptx.defineLayout({ name: 'WIDESCREEN_STANDARD', width: 13.33, height: 7.5 });
                pptx.layout = 'WIDESCREEN_STANDARD';

                const fontSize = parseInt(document.getElementById('font-size').value);
                const textAlign = document.getElementById('text-align').value;

                finalChunks.forEach(chunk => {
                    let slide = pptx.addSlide();
                    let textArray = [];
                    
                    chunk.forEach((line, index) => {
                        line.forEach(obj => {
                            textArray.push({
                                text: obj.text,
                                options: {
                                    bold: obj.options.bold || false,
                                    color: obj.options.color || '000000', // 기본 검은색
                                    fontFace: '옥션고딕 B', // 기본 폰트
                                    fontSize: fontSize
                                }
                            });
                        });
                        // 마지막 줄이 아니면 PptxGenJS 내부 줄바꿈 추가
                        if (index < chunk.length - 1) {
                            textArray.push({ text: '', options: { breakLine: true } });
                        }
                    });

                    // PptxGenJS의 Text 객체 배열 방식 사용
                    slide.addText(textArray, {
                        x: '5%', y: '5%', w: '90%', h: '90%', // 여백 조정
                        align: textAlign,
                        valign: 'middle' // 세로 정렬 중앙
                    });
                });

                await pptx.writeFile({ fileName: `Converted_PPT_${file.name.replace('.docx', '')}_${Date.now()}.pptx` });
                statusDiv.textContent = "변환 완료 및 다운로드 시작!";
            } catch (error) {
                console.error(error);
                statusDiv.textContent = "오류 발생: " + error.message;
                statusDiv.style.color = "red";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
