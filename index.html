<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word → PowerPoint Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/libs/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.min.js"></script>
    
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F8FAFC;
            --card-bg: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border: #E2E8F0;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container { width: 100%; max-width: 520px; }

        .main-card {
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            padding: 48px;
        }

        .header-section { text-align: center; margin-bottom: 40px; }
        .header-section h1 { font-size: 26px; font-weight: 800; margin: 0 0 10px 0; letter-spacing: -0.02em; }
        .header-section p { font-size: 15px; color: var(--text-muted); margin: 0; line-height: 1.5; }

        .upload-section { margin-bottom: 32px; }
        .upload-label {
            display: block; border: 2px dashed #CBD5E1; border-radius: 16px; padding: 40px 20px;
            text-align: center; cursor: pointer; transition: all 0.2s ease;
        }
        .upload-label:hover { border-color: var(--primary); background-color: #F1F5F9; }
        
        .upload-icon {
            display: inline-flex; justify-content: center; align-items: center;
            width: 56px; height: 56px; border-radius: 14px;
            background-color: #EEF2FF; color: var(--primary); margin-bottom: 16px;
        }
        .upload-icon svg { width: 28px; height: 28px; }

        .upload-text { display: block; font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .upload-subtext { display: block; font-size: 13px; color: var(--text-muted); }
        input[type="file"] { display: none; }

        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px;
            padding: 24px; background-color: #F8FAFC; border-radius: 16px; border: 1px solid var(--border);
        }

        .option-item { display: flex; flex-direction: column; gap: 8px; }
        .option-item.full { grid-column: 1 / -1; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
        
        .option-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }

        select {
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px;
            font-size: 14px; font-weight: 500; background-color: white; cursor: pointer;
        }

        .checkbox-wrapper { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .checkbox-wrapper input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }
        .checkbox-wrapper span { font-size: 14px; font-weight: 600; }

        button {
            width: 100%; background-color: var(--primary); color: white; border: none;
            padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: transform 0.1s, background-color 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #94A3B8; cursor: not-allowed; }

        #status { margin-top: 20px; text-align: center; font-size: 14px; font-weight: 600; color: var(--primary); }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-card">
            <div class="header-section">
                <h1>Word → PPT 변환기</h1>
                <p>디자인과 서식을 유지하며 스마트하게 변환합니다</p>
            </div>
            
            <div class="upload-section">
                <label for="upload" class="upload-label">
                    <span class="upload-icon">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    </span>
                    <span class="upload-text" id="file-display-name">워드 파일을 여기에 끌어다 놓으세요</span>
                    <span class="upload-subtext">지원 형식: .docx</span>
                </label>
                <input type="file" id="upload" accept=".docx" onchange="updateFileName()">
            </div>

            <div class="options-grid">
                <div class="option-item full">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="max-lines" checked>
                        <span>한 슬라이드당 최대 6줄 자동 분할</span>
                    </label>
                </div>
                <div class="option-item">
                    <label class="option-label">글자 크기</label>
                    <select id="font-size">
                        <option value="48">48pt</option>
                        <option value="60">60pt</option>
                    </select>
                </div>
                <div class="option-item">
                    <label class="option-label">텍스트 정렬</label>
                    <select id="text-align">
                        <option value="center">중앙 정렬</option>
                        <option value="left">좌측 정렬</option>
                    </select>
                </div>
            </div>

            <button id="convert-btn" onclick="startConversion()">파워포인트 생성 및 다운로드</button>
            <div id="status"></div>
        </div>
    </div>

    <script>
        function updateFileName() {
            const input = document.getElementById('upload');
            const display = document.getElementById('file-display-name');
            if (input.files.length > 0) {
                display.textContent = input.files[0].name;
            }
        }

        function colorToHex(color) {
            let ctx = document.createElement("canvas").getContext("2d");
            ctx.fillStyle = color;
            let hex = ctx.fillStyle;
            return hex.startsWith('#') ? hex.replace('#', '').toUpperCase() : '000000';
        }

        function parseNode(node, currentStyle) {
            let result = [];
            node.childNodes.forEach(child => {
                if (child.nodeType === Node.TEXT_NODE) {
                    if (child.textContent.length > 0) {
                        result.push({ text: child.textContent, options: { ...currentStyle } });
                    }
                } else if (child.nodeType === Node.ELEMENT_NODE) {
                    let newStyle = { ...currentStyle };
                    if (['STRONG', 'B'].includes(child.tagName)) newStyle.bold = true;
                    if (child.style && child.style.color) newStyle.color = colorToHex(child.style.color);
                    result = result.concat(parseNode(child, newStyle));
                }
            });
            return result;
        }

        async function startConversion() {
            const fileInput = document.getElementById('upload');
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('convert-btn');

            if (!fileInput.files.length) { alert("파일을 먼저 선택해주세요."); return; }

            const file = fileInput.files[0];
            
            // 💡 파일명 동기화 로직: 확장자 제거
            const originalName = file.name;
            const pptFileName = originalName.toLowerCase().endsWith('.docx') 
                                ? originalName.slice(0, -5) 
                                : originalName;

            btn.disabled = true;
            statusDiv.textContent = "변환 작업을 진행 중입니다...";

            try {
                const arrayBuffer = await file.arrayBuffer();
                const result = await mammoth.convertToHtml({ arrayBuffer: arrayBuffer }, { ignoreEmptyParagraphs: false });
                
                // 💡 엔터(빈 줄) 무시 방지를 위한 텍스트 마킹 처리
                let rawHtml = result.value;
                rawHtml = rawHtml.replace(/<p>\s*<\/p>/g, '<p>___EMPTY_LINE___</p>');
                rawHtml = rawHtml.replace(/<p>\s*<br\s*\/?>\s*<\/p>/g, '<p>___EMPTY_LINE___</p>');

                const parser = new DOMParser();
                const doc = parser.parseFromString(rawHtml, 'text/html');
                const paragraphs = Array.from(doc.querySelectorAll('p'));

                let allLines = paragraphs.map(p => {
                    const content = parseNode(p, {});
                    const isMarker = p.textContent.includes("___EMPTY_LINE___");
                    return { content, isEmpty: isMarker || p.textContent.trim() === "" };
                });

                let initialChunks = [];
                let tempChunk = [];
                allLines.forEach(line => {
                    if (line.isEmpty) {
                        if (tempChunk.length > 0) { initialChunks.push(tempChunk); tempChunk = []; }
                    } else {
                        tempChunk.push(line.content);
                    }
                });
                if (tempChunk.length > 0) initialChunks.push(tempChunk);

                const enforceMaxLines = document.getElementById('max-lines').checked;
                let finalChunks = [];
                initialChunks.forEach(chunk => {
                    if (enforceMaxLines && chunk.length > 6) {
                        for (let i = 0; i < chunk.length; i += 6) { finalChunks.push(chunk.slice(i, i + 6)); }
                    } else {
                        finalChunks.push(chunk);
                    }
                });

                let pptx = new PptxGenJS();
                pptx.defineLayout({ name: 'WIDESCREEN_STANDARD', width: 13.33, height: 7.5 });
                pptx.layout = 'WIDESCREEN_STANDARD';

                const fontSize = parseInt(document.getElementById('font-size').value);
                const textAlign = document.getElementById('text-align').value;

                finalChunks.forEach(chunk => {
                    let slide = pptx.addSlide();
                    let textArray = [];
                    chunk.forEach((line, index) => {
                        line.forEach(obj => {
                            textArray.push({
                                text: obj.text,
                                options: { bold: obj.options.bold || false, color: obj.options.color || '000000', fontFace: '옥션고딕 B', fontSize: fontSize }
                            });
                        });
                        if (index < chunk.length - 1) textArray.push({ text: '', options: { breakLine: true } });
                    });
                    slide.addText(textArray, { x: '5%', y: '5%', w: '90%', h: '90%', align: textAlign, valign: 'middle' });
                });

                // 💡 동기화된 파일명으로 저장
                await pptx.writeFile({ fileName: `${pptFileName}.pptx` });
                statusDiv.textContent = "✨ 성공적으로 변환되었습니다!";
            } catch (error) {
                statusDiv.textContent = "오류 발생: " + error.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
